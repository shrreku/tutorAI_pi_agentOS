services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: studyagent
      POSTGRES_PASSWORD: studyagent
      POSTGRES_DB: studyagent
    ports:
      # Host 5432 is often already taken by a local Postgres; use 5433 for StudyAgent.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyagent -d studyagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/studyagent-local
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: studyagent
      MINIO_ROOT_PASSWORD: studyagent-local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command:
      [
        "sh",
        "-c",
        "corepack enable && corepack prepare pnpm@10.0.0 --activate && pnpm install && pnpm --filter @studyagent/db migrate && pnpm --filter @studyagent/db seed && pnpm --filter @studyagent/api dev",
      ]
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://studyagent:studyagent@postgres:5432/studyagent
      REDIS_URL: redis://redis:6379
      API_PORT: "4000"
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: studyagent
      OBJECT_STORAGE_SECRET_KEY: studyagent-local
      OBJECT_STORAGE_BUCKET: studyagent-local
      OBJECT_STORAGE_REGION: us-east-1
      DISABLE_AUTH: "true"
      DEV_USER_EMAIL: dev@studyagent.local
      LOG_LEVEL: info
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      DEFAULT_TUTOR_MODEL: ${DEFAULT_TUTOR_MODEL:-openrouter/auto}
      DEFAULT_EXTRACTION_MODEL: ${DEFAULT_EXTRACTION_MODEL:-openrouter/auto}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      LLAMAPARSE_API_KEY: ${LLAMAPARSE_API_KEY:-}
      LLAMAPARSE_API_BASE_URL: ${LLAMAPARSE_API_BASE_URL:-https://api.cloud.llamaindex.ai}
      LLAMAPARSE_TIER: ${LLAMAPARSE_TIER:-cost_effective}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: studyagent-local
    volumes:
      - .:/workspace
      - studyagent-node-modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  worker:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command:
      [
        "sh",
        "-c",
        "corepack enable && corepack prepare pnpm@10.0.0 --activate && pnpm install && pnpm --filter @studyagent/worker dev",
      ]
    environment:
      DATABASE_URL: postgres://studyagent:studyagent@postgres:5432/studyagent
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: studyagent
      OBJECT_STORAGE_SECRET_KEY: studyagent-local
      OBJECT_STORAGE_BUCKET: studyagent-local
      OBJECT_STORAGE_REGION: us-east-1
      DISABLE_AUTH: "true"
      DEV_USER_EMAIL: dev@studyagent.local
      LOG_LEVEL: info
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      DEFAULT_TUTOR_MODEL: ${DEFAULT_TUTOR_MODEL:-openrouter/auto}
      DEFAULT_EXTRACTION_MODEL: ${DEFAULT_EXTRACTION_MODEL:-openrouter/auto}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      LLAMAPARSE_API_KEY: ${LLAMAPARSE_API_KEY:-}
      LLAMAPARSE_API_BASE_URL: ${LLAMAPARSE_API_BASE_URL:-https://api.cloud.llamaindex.ai}
      LLAMAPARSE_TIER: ${LLAMAPARSE_TIER:-cost_effective}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: studyagent-local
    volumes:
      - .:/workspace
      - studyagent-node-modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command:
      [
        "sh",
        "-c",
        "corepack enable && corepack prepare pnpm@10.0.0 --activate && pnpm install && VITE_API_PROXY_TARGET=http://api:4000 pnpm --filter @studyagent/web dev -- --host 0.0.0.0 --port 5173",
      ]
    ports:
      - "8080:5173"
    volumes:
      - .:/workspace
      - studyagent-node-modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  neo4j-data:
  redis-data:
  minio-data:
  studyagent-node-modules:
